# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Olaf's home page 
email: olaf.wysocki@tum.de
logo: "/assets/images/earthLogo.png"
description: >- # this means to ignore newlines until "baseurl:"
  Olaf Wysocki website about his geospatial world. The website presents his CV,
  blog, geospatial news, GIS (Geographical Information Systems), Photogrammetry, Remote Sensing, Computer Vision, Machine Learning, AI.
  Applications in maps creation, like Autonomous driving technology from AUDI AG perspective,
  and relation to Elon Musk point of view.
  Olaf was also a member of Hyperloop TUM (idea of Elon Musk) team.
twitter_username: username
github_username: olafwysocki
minimal_mistakes_skin: "contrast"
search: true

#header:
#    image: "/assets/images/logo.png"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Europe/Munich
# https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Olaf Wysocki"
  avatar : "/assets/images/olaf.jpg"
  bio    : "I'm Research Assitant & PhD Candidate at the TUM. My research focuses on the reconstruction of semantic 3D building models by means of MLS point clouds and confidence values. Passionate about the geospatial world and Manchester United."
  linkedin: olaf-wysocki-24b557148
  links:
